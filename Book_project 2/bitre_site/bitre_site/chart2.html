function render(){
  const year=+d3.select('#yearFilter').node().value;
  const offence=d3.select('#offenceFilter').node().value;
  const sort=d3.select('#sortFilter').node().value;
  let filtered=allData.filter(d=>d.year===year);
  if(offence!=='All') filtered=filtered.filter(d=>d.offence===offence);
  const byState=d3.rollup(filtered,v=>d3.sum(v,d=>d.count),d=>d.state);
  let stateData=STATES.map((s,i)=>({state:s,count:byState.get(s)||0,color:STATE_COLORS[i]}));
  if(sort==='count') stateData.sort((a,b)=>b.count-a.count);
  d3.select('#barSubtitle').text(`${year} · ${offence==='All'?'All Offences':offence} · Click a bar to highlight`);
  drawBars(stateData,offence);
  drawShare(stateData);
  drawBarLegend(offence);
}

function drawBars(stateData,offence){
  const el=document.getElementById('barChart');
  const W=el.clientWidth||600, H=el.clientHeight||260;
  const M={top:10,right:14,bottom:44,left:74};
  const w=W-M.left-M.right, h=H-M.top-M.bottom;
  let svg=d3.select(el).select('svg');
  if(svg.empty()){
    svg=d3.select(el).append('svg').style('display','block');
    svg.append('g').attr('class','grid-g');
    svg.append('g').attr('class','axis axis-x');
    svg.append('g').attr('class','axis axis-y');
    svg.append('text').attr('class','y-label').attr('transform','rotate(-90)').attr('text-anchor','middle').attr('fill','rgba(170,195,220,0.5)').attr('font-size',9.5).attr('font-family','var(--font-body)').text('Infringements');
    svg.append('g').attr('class','bars-g');
  }
  svg.attr('width',W).attr('height',H);
  svg.select('.grid-g').attr('transform',`translate(${M.left},${M.top})`);
  svg.select('.axis-x').attr('transform',`translate(${M.left},${M.top+h})`);
  svg.select('.axis-y').attr('transform',`translate(${M.left},${M.top})`);
  svg.select('.y-label').attr('x',-h/2-M.top).attr('y',M.left-62);
  svg.select('.bars-g').attr('transform',`translate(${M.left},${M.top})`);
  const xScale=d3.scaleBand().domain(stateData.map(d=>d.state)).range([0,w]).padding(0.28);
  const yScale=d3.scaleLinear().domain([0,d3.max(stateData,d=>d.count)*1.12]).range([h,0]).nice();
  svg.select('.grid-g').call(d3.axisLeft(yScale).tickSize(-w).tickFormat('').ticks(4)).attr('class','grid grid-g');
  svg.select('.axis-x').transition().duration(400).call(d3.axisBottom(xScale)).attr('class','axis axis-x');
  svg.select('.axis-y').transition().duration(400).call(d3.axisLeft(yScale).ticks(4).tickFormat(d=>d3.format('.2s')(d))).attr('class','axis axis-y');
  const g=svg.select('.bars-g');
  const bars=g.selectAll('.bar-grp').data(stateData,d=>d.state);
  const barsE=bars.enter().append('g').attr('class','bar-grp');
  barsE.append('rect').attr('class','bar').attr('rx',4).attr('y',h).attr('height',0);
  barsE.append('text').attr('class','bar-label');
  bars.exit().remove();
  bars.merge(barsE).each(function(d){
    const dim=highlighted&&highlighted!==d.state;
    const fill=offence==='All'?d.color:(COLORS[offence]||d.color);
    const bg=d3.select(this);
    bg.select('.bar').attr('x',xScale(d.state)).attr('width',xScale.bandwidth()).style('cursor','pointer').attr('fill',fill).attr('opacity',dim?0.18:1)
      .on('click',()=>{highlighted=(highlighted===d.state)?null:d.state;render();})
      .on('mousemove',event=>{tooltip.classed('visible',true).html(`<div class="tooltip-title">${d.state}</div><hr>${d.count.toLocaleString()} infringements`).style('left',(event.clientX+14)+'px').style('top',(event.clientY-48)+'px');})
      .on('mouseleave',()=>tooltip.classed('visible',false))
      .transition().duration(450).attr('y',yScale(d.count)).attr('height',h-yScale(d.count));
    bg.select('.bar-label').attr('x',xScale(d.state)+xScale.bandwidth()/2).attr('text-anchor','middle').attr('font-size',9).attr('fill',dim?'rgba(100,130,155,0.25)':'rgba(170,195,220,0.7)').attr('font-family','var(--font-body)').attr('pointer-events','none').text(d.count>0?d3.format('.2s')(d.count):'').transition().duration(450).attr('y',yScale(d.count)-4);
  });
}

function drawShare(stateData){
  const el=document.getElementById('shareChart');
  d3.select(el).selectAll('*').remove();
  const total=d3.sum(stateData,d=>d.count)||1;
  const W=el.clientWidth||400, H=el.clientHeight||260;
  const M={top:6,right:50,bottom:24,left:44};
  const w=W-M.left-M.right, h=H-M.top-M.bottom;
  const svg=d3.select(el).append('svg').attr('width',W).attr('height',H).style('display','block').append('g').attr('transform',`translate(${M.left},${M.top})`);
  const sorted=[...stateData].sort((a,b)=>b.count-a.count);
  const xScale=d3.scaleLinear().domain([0,100]).range([0,w]);
  const yScale=d3.scaleBand().domain(sorted.map(d=>d.state)).range([0,h]).padding(0.3);
  svg.append('g').attr('class','axis').call(d3.axisLeft(yScale));
  svg.append('g').attr('class','axis').attr('transform',`translate(0,${h})`).call(d3.axisBottom(xScale).tickFormat(d=>d+'%').ticks(4));
  sorted.forEach(d=>{
    const pct=(d.count/total)*100;
    const dim=highlighted&&highlighted!==d.state;
    svg.append('rect').attr('x',0).attr('y',yScale(d.state)).attr('height',yScale.bandwidth()).attr('rx',3)
      .attr('fill',d.color).attr('opacity',dim?0.15:0.85).attr('width',0)
      .transition().duration(550).delay(30).attr('width',xScale(pct));
    if(pct>1.5) svg.append('text').attr('x',xScale(pct)+5).attr('y',yScale(d.state)+yScale.bandwidth()/2+4).attr('font-size',9.5).attr('font-family','var(--font-body)').attr('fill',dim?'rgba(100,130,155,0.25)':'rgba(170,195,220,0.65)').text(pct.toFixed(1)+'%');
  });
}

function drawBarLegend(offence){
  const leg=d3.select('#barLegend');leg.selectAll('*').remove();
  if(offence!=='All'){
    const item=leg.append('div').attr('class','legend-item');
    item.append('div').attr('class','legend-dot').style('background',COLORS[offence]);
    item.append('span').text(offence);
  } else {
    STATES.forEach((s,i)=>{
      const item=leg.append('div').attr('class','legend-item');
      item.append('div').attr('class','legend-dot').style('background',STATE_COLORS[i]);
      item.append('span').text(s);
    });
  }
  if(highlighted) leg.append('div').attr('class','legend-clear').text('✕ Clear').on('click',()=>{highlighted=null;render();});
}
</script>
</body>
</html>
